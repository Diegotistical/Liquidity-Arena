engine:
  host: "127.0.0.1"
  port: 9876
  tick_size: 0.01  # 1 tick = 1 cent

simulation:
  num_steps: 10000
  step_interval_ms: 10  # 10ms between simulation steps

price_process:
  type: "OU"           # "OU" (mean-reverting) or "GBM"
  initial_price: 10000  # $100.00 in ticks
  kappa: 0.5            # Mean-reversion speed (OU only)
  theta: 10000          # Long-run mean (OU only)
  sigma: 50             # Volatility
  seed: 42

agents:
  market_maker:
    gamma: 0.01          # Risk aversion (higher = wider spreads)
    kappa: 1.5           # Order arrival intensity
    max_inventory: 100
    num_levels: 3        # Quote 3 bid + 3 ask price levels
    level_spacing: 2     # Ticks between quote levels
    base_quantity: 50
    sigma_window: 100    # Rolling window for σ² estimation

  noise_traders:
    count: 5
    order_prob: 0.3
    spread_range: 20     # Max ticks from midprice
    min_qty: 10
    max_qty: 100
    market_order_prob: 0.05

  informed_traders:
    count: 2
    threshold: 15        # Ticks of edge before trading
    aggression: 0.8      # Probability of acting on signal
    min_qty: 50
    max_qty: 200

  momentum_traders:
    count: 2
    fast_period: 10
    slow_period: 50
    trade_prob: 0.3
    min_qty: 20
    max_qty: 80

visualization:
  ws_port: 8765
  http_port: 8080
  update_interval: 5    # Push to frontend every N steps
