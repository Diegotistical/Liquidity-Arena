name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── C++ Build & Test (Linux) ─────────────────────────────────────
  cpp-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Tests
        run: ./build/arena_tests

      - name: Run Benchmarks
        if: matrix.build_type == 'Release'
        run: ./build/arena_bench

  # ── C++ Build & Test (Windows MSVC) ──────────────────────────────
  cpp-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: .\build\Release\arena_tests.exe

  # ── C++ Sanitizers (Linux only) ──────────────────────────────────
  cpp-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

      - name: Configure with Sanitizers
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DARENA_SANITIZERS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Tests (ASan + UBSan)
        run: ./build/arena_tests

  # ── Python Tests ─────────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff format --check simulation/
          ruff check simulation/

      - name: Run Python tests
        run: python -m pytest simulation/tests/ -v
