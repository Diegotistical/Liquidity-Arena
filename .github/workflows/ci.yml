name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux (GCC 13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++-13

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ./build/arena_tests
        working-directory: ${{ github.workspace }}

      - name: Benchmark (dry run)
        run: ./build/arena_bench --benchmark_min_time=0.1s
        working-directory: ${{ github.workspace }}

  build-windows:
    name: Windows (MSYS2 MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            git

      - name: Configure
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ./build/arena_tests.exe

      - name: Benchmark (dry run)
        run: ./build/arena_bench.exe --benchmark_min_time=0.1s
